<!DOCTYPE html>
<html>
<head>
  <title>Student Registration</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #74ebd5, #acb6e5);
      text-align: center;
    }

    .form-box {
      background: white;
      padding: 20px;
      width: 320px;
      margin: auto;
      margin-top: 50px;
      border-radius: 10px;
    }

    input, select {
      width: 95%;
      padding: 8px;
      margin: 8px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }

    #msg {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="form-box">
  <h2>Student Registration</h2>

  <form action="https://script.google.com/macros/s/AKfycbwwqHHgub54ZishErhuepX9jy2l3QfuCXhMcsyvJIMDs7dhrnywlfr9BrXeJnDcxwrt/exec" method="POST" onsubmit="return validateForm()">
    <!-- hidden (for FormSubmit) -->
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_template" value="table">

    <input type="text" name="name" id="name" placeholder="Enter Name">
    <input type="email" name="email" id="email" placeholder="Enter Email">
    <input type="text" name="phone" id="phone" placeholder="Phone Number">
    <input type="text" name="college" id="college" placeholder="College Name">

    <select name="course" id="course">
      <option value="">Select Course</option>
      <option>CM</option>
      <option>IT</option>
      <option>AIML</option>
      <option>Other</option>
    </select>

    Gender:<br>
    <input type="radio" name="gender" value="Male"> Male
    <input type="radio" name="gender" value="Female"> Female

    <br><br>

    <button type="submit">Register</button>

    <p id="msg"></p>

  </form>

</div>

<script>
function validateForm() {

  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let phone = document.getElementById("phone").value;
  let college = document.getElementById("college").value;
  let course = document.getElementById("course").value;
  let gender = document.querySelector('input[name="gender"]:checked');

  let msg = document.getElementById("msg");

  // check empty
  if (name=="" || email=="" || phone=="" || college=="" || course=="" || !gender) {
    msg.innerHTML = "All fields are required!";
    msg.style.color = "red";
    return false;
  }

  // email check
  let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
  if (!email.match(emailPattern)) {
    msg.innerHTML = "Invalid Email!";
    msg.style.color = "red";
    return false;
  }

  // phone check
  let phonePattern = /^[0-9]{10}$/;
  if (!phone.match(phonePattern)) {
    msg.innerHTML = "Enter 10 digit number!";
    msg.style.color = "red";
    return false;
  }

  // success message
  msg.innerHTML = "Registration Successful!";
  msg.style.color = "green";

  return true;
}
</script>

</body>
</html>
